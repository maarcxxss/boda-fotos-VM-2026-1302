<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Álbum de la boda de Miguel y Vanessa</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* 🌸 BACKGROUND PREMIUM */
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at top, #fff6f8, #f7f7fb);
    overflow-x: hidden;
}

/* 🌿 HEADER APP STYLE */
header {
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.7);
    padding: 18px 12px;
    text-align: center;
    border-bottom: 1px solid rgba(0,0,0,0.05);
}

header h1 {
    margin: 0;
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: #c06c84;
}

header p {
    margin: 5px 0 0;
    font-size: 13px;
    color: #666;
}

/* 📊 COUNTER */
#counter {
    margin-top: 6px;
    font-size: 12px;
    color: #888;
}

/* 🔘 SWITCH */
.switch {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 12px;
}

.switch button {
    padding: 8px 14px;
    border: none;
    border-radius: 999px;
    background: #eee;
    font-size: 13px;
    cursor: pointer;
    transition: 0.2s;
}

.switch button.active {
    background: linear-gradient(135deg, #d36b8d, #ff9bb5);
    color: white;
}

/* 📸 GALERÍA PREMIUM */
#gallery {
    max-width: 1100px;
    margin: 20px auto 90px;
    padding: 0 12px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 10px;
}

.item {
    opacity: 0;
    transform: scale(0.96);
    animation: fadeIn 0.35s ease forwards;
}

@keyframes fadeIn {
    to {
        opacity: 1;
        transform: scale(1);
    }
}

img, video {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 14px;
    cursor: pointer;
    box-shadow: 0 6px 16px rgba(0,0,0,0.08);
    transition: 0.2s;
}

img:hover, video:hover {
    transform: scale(1.03);
}

/* 🔳 LIGHTBOX */
.lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    justify-content: center;
    align-items: center;
    z-index: 999;
    padding: 20px;
    box-sizing: border-box;
}

/* CONTENEDOR INTERNO */
.lightbox-content {
    max-width: 100%;
    max-height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* MEDIA */
.lightbox img,
.lightbox video {
    max-width: 100%;
    max-height: 90vh;
    width: auto;
    height: auto;
    object-fit: contain;
    border-radius: 12px;
}

/* 🔔 TOAST PREMIUM */
.toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.8);
    color: white;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 13px;
    opacity: 0;
    transition: 0.3s;
}

.toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(-6px);
}

/* ➕ FLOATING BUTTON */
.fab {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: none;
    font-size: 24px;
    background: linear-gradient(135deg, #d36b8d, #ff9bb5);
    color: white;
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    cursor: pointer;
}

</style>
</head>

<body>

<header>
    <h1>💍 Álbum de Miguel & Vanessa</h1>
    <p>💖 Comparte momentos únicos ✨</p>

    <div id="counter">0 recuerdos</div>

    <div class="switch">
        <button id="btnPhotos" class="active">📸 Fotos</button>
        <button id="btnVideos">🎥 Vídeos</button>
    </div>
</header>

<div id="gallery"></div>

<div class="lightbox" id="lightbox">
    <div class="lightbox-content" id="lightboxContent"></div>
</div>

<div class="toast" id="toast"></div>

<button class="fab" id="uploadBtn">➕</button>

<!-- CLOUDINARY -->
<script src="https://upload-widget.cloudinary.com/latest/global/all.js"></script>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>

/* =========================
   PWD BASICA
========================= */
/*const acceso = prompt("Introduce la clave de acceso");

if (acceso !== "BodaVM2026") {
    document.body.innerHTML = "<h1>🔒 Sitio en preparación</h1>";
}*/


const CLOUD_NAME = "dczhox5iy";
const UPLOAD_PRESET = "boda_mama";


/* 🔥 FIREBASE  */
const firebaseConfig = {
  apiKey: "AIzaSyB_FAPmCzrLg5J1mlATWuYfNL2afZm4z7s",
  authDomain: "boda-fotos-b2125.firebaseapp.com",
  databaseURL: "https://boda-fotos-b2125-default-rtdb.europe-west1.firebasedatabase.app/",
  projectId: "boda-fotos-b2125",
  storageBucket: "boda-fotos-b2125.firebasestorage.app",
  messagingSenderId: "1003527625683",
  appId: "1:1003527625683:web:7e8c11d979d641005fad26",
  measurementId: "G-Y708N9Q37R"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentVideo = null;
let mode = "photos";
let items = [];

const gallery = document.getElementById("gallery");
const counter = document.getElementById("counter");
const toast = document.getElementById("toast");

function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 2000);
}

/* SWITCH */
document.getElementById("btnPhotos").onclick = () => {
    mode = "photos";
    setActive();
    render();
};

document.getElementById("btnVideos").onclick = () => {
    mode = "videos";
    setActive();
    render();
};

function setActive() {
    document.getElementById("btnPhotos").classList.toggle("active", mode==="photos");
    document.getElementById("btnVideos").classList.toggle("active", mode==="videos");
}

/* RENDER */
function render() {
    gallery.innerHTML = "";

    let filtered = items.filter(i => i.type === mode);

    counter.textContent = `${filtered.length} recuerdos`;

    filtered.forEach(i => {

        const wrapper = document.createElement("div");
        wrapper.className = "item";

        if (i.type === "photos") {
            wrapper.innerHTML = `<img src="${i.url}">`;
            wrapper.onclick = () => openMedia(i.url, "image");
        } else {
            wrapper.innerHTML = `<video src="${i.url}" muted autoplay loop></video>`;
            wrapper.onclick = () => openMedia(i.url, "video");
        }

        gallery.appendChild(wrapper);
    });
}

/* LIGHTBOX */
function openMedia(url, type) {
    const lb = document.getElementById("lightbox");
    const content = document.getElementById("lightboxContent");

    content.innerHTML = "";

    if (type === "image") {
        content.innerHTML = `<img id="activeMedia" src="${url}">`;
        currentVideo = null;
    } else {
        content.innerHTML = `<video id="activeMedia" src="${url}" controls autoplay></video>`;
        currentVideo = content.querySelector("video");
    }

    lb.style.display = "flex";
}

document.getElementById("lightbox").onclick = (e) => {
    if (e.target.id === "lightbox") {

        const video = document.querySelector("#lightbox video");
        if (video) {
            video.pause();
            video.currentTime = 0;
        }

        document.getElementById("lightbox").style.display = "none";
    }
};

/* UPLOAD */
const widget = cloudinary.createUploadWidget({
    cloudName: CLOUD_NAME,
    uploadPreset: UPLOAD_PRESET,
    multiple: true,
    resourceType: "auto"
}, (error, result) => {

    if (result && result.event === "success") {

        const url = result.info.secure_url;
        const type = result.info.resource_type === "video" ? "videos" : "photos";

        db.ref("items").push({
            url,
            type,
            createdAt: Date.now()
        });

        showToast("✨ Subido con éxito");
    }
});

document.getElementById("uploadBtn").onclick = () => widget.open();

/* LOAD */
db.ref("items").on("value", snap => {

    items = [];

    if (snap.val()) {
        Object.values(snap.val()).forEach(i => items.push(i));
    }

    render();
});

setActive();

</script>

</body>
</html>
