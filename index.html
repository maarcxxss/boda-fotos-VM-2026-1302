<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Álbum de la boda de Miguel y Vanessa</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
/* PANTALLA BIENVENIDA */
#welcomeScreen{
    position:fixed;
    inset:0;
    z-index:9999;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(
        135deg,
        #fff7f8,
        #fffdfc
    );
}

.welcome-card{
    text-align:center;
    max-width:500px;
    padding:40px;
}

.rings{
    font-size:70px;
    animation: floatRing 3s ease-in-out infinite;
}

@keyframes floatRing{
    50%{
        transform:translateY(-10px);
    }
}

.welcome-card h1{
    font-family:'Playfair Display', serif;
    color:#c06c84;
    margin:20px 0;
    font-size:42px;
}

.welcome-card p{
    color:#666;
    font-size:18px;
    line-height:1.6;
}

#enterAlbum{
    margin-top:30px;
    padding:15px 28px;
    border:none;
    border-radius:999px;

    background:
    linear-gradient(
        135deg,
        #d36b8d,
        #ff9bb5
    );

    color:white;
    font-size:16px;
    cursor:pointer;
}

.welcome-hide{
    opacity:0;
    pointer-events:none;
    transition:0.6s;
}


/* 🌸 BACKGROUND PREMIUM */
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at top, #fff6f8, #f7f7fb);
    overflow-x: hidden;
}

/* 🌿 HEADER APP STYLE */
header {
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.7);
    padding: 18px 12px;
    text-align: center;
    border-bottom: 1px solid rgba(0,0,0,0.05);
}

header h1 {
    margin: 0;
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: #c06c84;
}

header p {
    margin: 5px 0 0;
    font-size: 13px;
    color: #666;
}

/* 📊 COUNTER */
#counter {
    margin-top: 6px;
    font-size: 12px;
    color: #888;
}

/* 🔘 SWITCH */
.switch {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 12px;
}

.switch button {
    padding: 8px 14px;
    border: none;
    border-radius: 999px;
    background: #eee;
    font-size: 13px;
    cursor: pointer;
    transition: 0.2s;
}

.switch button.active {
    background: linear-gradient(135deg, #d36b8d, #ff9bb5);
    color: white;
}

/* 📸 GALERÍA PREMIUM */
#gallery {
    max-width: 1100px;
    margin: 20px auto 90px;
    padding: 0 12px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 10px;
}

.item {
    opacity: 0;
    transform: scale(0.96);
    animation: fadeIn 0.35s ease forwards;
}

@keyframes fadeIn {
    to {
        opacity: 1;
        transform: scale(1);
    }
}

img, video {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 14px;
    cursor: pointer;
    box-shadow: 0 6px 16px rgba(0,0,0,0.08);
    transition: 0.2s;
}

img:hover, video:hover {
    transform: scale(1.03);
}

/* 🔳 LIGHTBOX */
.lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    justify-content: center;
    align-items: center;
    z-index: 999;
    padding: 20px;
    box-sizing: border-box;
}

/* CONTENEDOR INTERNO */
.lightbox-content {
    max-width: 100%;
    max-height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* MEDIA */
.lightbox img,
.lightbox video {
    max-width: 100%;
    max-height: 90vh;
    width: auto;
    height: auto;
    object-fit: contain;
    border-radius: 12px;
}

/* 🔔 TOAST PREMIUM */
.toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.8);
    color: white;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 13px;
    opacity: 0;
    transition: 0.3s;
}

.toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(-6px);
}

/* ➕ FLOATING BUTTON */
.fab {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: none;
    font-size: 24px;
    background: linear-gradient(135deg, #d36b8d, #ff9bb5);
    color: white;
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    cursor: pointer;
}

/* EFECTO DE CORAZONES */
.heart{

    position:fixed;

    bottom:80px;
    left:50%;

    font-size:28px;

    pointer-events:none;

    animation:
        heartFloat 2.5s ease-out forwards;
}

@keyframes heartFloat{

    0%{
        opacity:1;
        transform:
            translateX(0)
            translateY(0)
            scale(1);
    }

    100%{
        opacity:0;
        transform:
            translateX(var(--x))
            translateY(-250px)
            scale(1.8);
    }
}

</style>
</head>

<body>

<!-- PANTALLA BIENVENIDA -->
<div id="welcomeScreen">

    <div class="welcome-card">

        <div class="rings">💍</div>

        <h1>Miguel & Vanessa</h1>

        <p>
            Gracias por acompañarnos en uno de los días
            más importantes de nuestra vida ❤️
        </p>

        <button id="enterAlbum">
            Entrar al álbum
        </button>

    </div>

</div>

<!-- HEADER ALBUM -->
<header>
    <h1 id="title">💍 Álbum de Miguel & Vanessa</h1>
    <p>💖 Comparte momentos únicos ✨</p>

    <div id="counter">0 recuerdos</div>

    <div class="switch">
        <button id="btnPhotos" class="active">📸 Fotos</button>
        <button id="btnVideos">🎥 Vídeos</button>
    </div>
</header>

<!-- GALERIA ALBUM -->
<div id="gallery"></div>

<div class="lightbox" id="lightbox">
    <div class="lightbox-content" id="lightboxContent"></div>
</div>

<div class="toast" id="toast"></div>

<button class="fab" id="uploadBtn">➕</button>

<!-- CLOUDINARY -->
<script src="https://upload-widget.cloudinary.com/latest/global/all.js"></script>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>

/* =========================
   PWD BASICA
========================= */
/*const acceso = prompt("Introduce la clave de acceso");

if (acceso !== "BodaVM2026") {
    document.body.innerHTML = "<h1>🔒 Sitio en preparación</h1>";
}*/


/* cloudinary pruebas - cuenta marcos */
const CLOUD_NAME = "dczhox5iy";
const UPLOAD_PRESET = "boda_mama";

/* cloudinary boda - cuenta boda */
//const CLOUD_NAME = "dgemhfhlc";
//const UPLOAD_PRESET = "boda_mama";


/* 🔥 FIREBASE  */
const firebaseConfig = {
  apiKey: "AIzaSyB_FAPmCzrLg5J1mlATWuYfNL2afZm4z7s",
  authDomain: "boda-fotos-b2125.firebaseapp.com",
  databaseURL: "https://boda-fotos-b2125-default-rtdb.europe-west1.firebasedatabase.app/",
  projectId: "boda-fotos-b2125",
  storageBucket: "boda-fotos-b2125.firebasestorage.app",
  messagingSenderId: "1003527625683",
  appId: "1:1003527625683:web:7e8c11d979d641005fad26",
  measurementId: "G-Y708N9Q37R"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* variables zoom insta */
let scale = 1;
let lastScale = 1;
let initialDistance = null;

let startX = 0;
let startY = 0;

let originX = 0;
let originY = 0;

let translateX = 0;
let translateY = 0;

let isPanning = false;
let lastTap = 0;



let currentVideo = null;

let adminMode = false;

/* para lanar corazones despues de cerrar widget */
let anadido = false;
let pendingUploads = 0;

let mode = "photos";
let items = [];

const gallery = document.getElementById("gallery");
const counter = document.getElementById("counter");
const toast = document.getElementById("toast");

function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 2000);
}

/* SWITCH FOTOS-VIDEOS */
document.getElementById("btnPhotos").onclick = () => {
    mode = "photos";
    setActive();
    render();
};

document.getElementById("btnVideos").onclick = () => {
    mode = "videos";
    setActive();
    render();
};

function setActive() {
    document.getElementById("btnPhotos").classList.toggle("active", mode==="photos");
    document.getElementById("btnVideos").classList.toggle("active", mode==="videos");
}

/* RENDER */
function render() {
    gallery.innerHTML = "";

    let filtered = items.filter(i => i.type === mode);

    counter.textContent = `${filtered.length} recuerdos`;

    filtered.forEach(i => {

        const wrapper = document.createElement("div");
        wrapper.style.position = "relative";
        wrapper.className = "item";

        if (i.type === "photos") {
            wrapper.innerHTML = `<img src="${i.url}">`;
            wrapper.onclick = () => openMedia(i.url, "image");
        } else {
            wrapper.innerHTML = `<video src="${i.url}" muted autoplay loop></video>`;
            wrapper.onclick = () => openMedia(i.url, "video");
        }

        /* Para el modo admin */
        if (adminMode) {

            const del = document.createElement("button");

            del.innerHTML = "🗑️";

            del.style.position = "absolute";
            del.style.top = "8px";
            del.style.right = "8px";
            del.style.width = "36px";
            del.style.height = "36px";
            del.style.borderRadius = "50%";
            del.style.border = "none";
            del.style.cursor = "pointer";
            del.style.background = "rgba(255,0,0,0.85)";
            del.style.color = "white";
            del.style.fontSize = "18px";

            del.onclick = (e) => {

                e.stopPropagation();

                if (confirm("¿Eliminar este archivo?")) {

                    if (!i.id) return;

                    db.ref("items/" + i.id).remove();

                    showToast("🗑️ Eliminado");
                }
            };

            wrapper.appendChild(del);
        }

        gallery.appendChild(wrapper);
    });
}

/* LIGHTBOX */
function openMedia(url, type) {
    const lb = document.getElementById("lightbox");
    const content = document.getElementById("lightboxContent");

    content.innerHTML = "";

    if (type === "image") {
        content.innerHTML = `<img id="activeMedia" src="${url}">`;
        currentVideo = null;
    } else {
        content.innerHTML = `<video id="activeMedia" src="${url}" controls autoplay></video>`;
        currentVideo = content.querySelector("video");
    }

    lb.style.display = "flex";

    resetZoom();
}

/* pinch zoom real (móvil) */
document.addEventListener("gesturestart", e => e.preventDefault());

const lightboxContent = document.getElementById("lightboxContent");

lightboxContent.addEventListener("touchstart", (e) => {

    const media = document.getElementById("activeMedia");
    if (!media) return;

    if (e.touches.length === 2) {

        let dx = e.touches[0].clientX - e.touches[1].clientX;
        let dy = e.touches[0].clientY - e.touches[1].clientY;

        initialDistance = Math.sqrt(dx * dx + dy * dy);
        lastScale = scale;
    }

    if (e.touches.length === 1 && scale > 1) {
        isPanning = true;

        startX = e.touches[0].clientX - translateX;
        startY = e.touches[0].clientY - translateY;
    }
});

lightboxContent.addEventListener("touchmove", (e) => {

    const media = document.getElementById("activeMedia");
    if (!media) return;

    // PINCH
    if (e.touches.length === 2) {

        e.preventDefault();

        let dx = e.touches[0].clientX - e.touches[1].clientX;
        let dy = e.touches[0].clientY - e.touches[1].clientY;

        let distance = Math.sqrt(dx * dx + dy * dy);

        if (!initialDistance) return;

        scale = lastScale * (distance / initialDistance);

        scale = Math.max(1, Math.min(scale, 3));

        media.style.transform =
            `translate(${translateX}px, ${translateY}px) scale(${scale})`;

        media.style.transition = "none";
    }

    // PAN
    if (e.touches.length === 1 && isPanning && scale > 1) {

        e.preventDefault();

        translateX = e.touches[0].clientX - startX;
        translateY = e.touches[0].clientY - startY;

        media.style.transform =
            `translate(${translateX}px, ${translateY}px) scale(${scale})`;
    }

}, { passive: false });

lightboxContent.addEventListener("touchend", () => {

    initialDistance = null;
    isPanning = false;

    const media = document.getElementById("activeMedia");
    if (!media) return;

    media.style.transition = "transform 0.2s ease";

    // si vuelve a 1, reset de pan
    if (scale <= 1) {
        scale = 1;
        translateX = 0;
        translateY = 0;

        media.style.transform = "scale(1)";
    }
});

lightboxContent.addEventListener("touchend", (e) => {

    const now = Date.now();
    const media = document.getElementById("activeMedia");
    if (!media) return;

    if (now - lastTap < 300) {

        if (scale > 1) {
            scale = 1;
            translateX = 0;
            translateY = 0;
        } else {
            scale = 2.5;
        }

        media.style.transition = "transform 0.25s ease";
        media.style.transform =
            `translate(0px,0px) scale(${scale})`;
    }

    lastTap = now;
});


function resetZoom() {
    scale = 1;
    lastScale = 1;
    translateX = 0;
    translateY = 0;

    const media = document.getElementById("activeMedia");
    if (media) {
        media.style.transform = "translate(0px,0px) scale(1)";
        media.style.transition = "transform 0.2s ease";
    }
}


/* cierre lightbox */
document.getElementById("lightbox").onclick = (e) => {
    if (e.target.id === "lightbox") {

        const video = document.querySelector("#lightbox video");
        if (video) {
            video.pause();
            video.currentTime = 0;
        }

        resetZoom();

        document.getElementById("lightbox").style.display = "none";
    }
};



/* UPLOAD */
const widget = cloudinary.createUploadWidget({
    
    cloudName: CLOUD_NAME,
    uploadPreset: UPLOAD_PRESET,
    multiple: true,
    resourceType: "auto",
    sources: ["local", "camera"],
    showAdvancedOptions: false,
    showCompletedButton: true,
    singleUploadAutoClose: false,
    maxFileSize: 80000000, // 80MB límite seguro
    maxImageFileSize: 20000000 // 20MB imágenes

}, (error, result) => {

    if (result?.event === "upload-added") {
        pendingUploads++;
        anadido = true;
    }

    if (result?.event === "success" && result.info?.secure_url) {

        const url = result.info.secure_url;
        // fuerza optimización Cloudinary
        const optimizedUrl = optimizeCloudinary(url);

        const type = result.info.resource_type === "video" ? "videos" : "photos";

        db.ref("items").push({
            url: optimizedUrl,
            type,
            createdAt: Date.now()
        });

        pendingUploads--;
    }

    if (result?.event === "close") {

        if (pendingUploads <= 0 && anadido == true) {
            launchHearts();
            showToast("✨ Subido con éxito");
            anadido = false;
        }
    }

    if (error) {
        showToast("⚠️ Error subiendo, inténtalo otra vez");
        console.error(error);
    }
});


function optimizeCloudinary(url) {
    if (!url.includes("/upload/")) return url;
    return url.replace("/upload/", "/upload/f_auto,q_auto,w_1200/");
}


document.getElementById("uploadBtn").onclick = () => widget.open();

/* LOAD */
db.ref("items").on("value", snap => {

    items = [];

    if (snap.val()) {

        Object.entries(snap.val()).forEach(([key, value]) => {

            items.push({
                id: key,
                ...value
            });

        });
    }

    items.sort((a,b) => b.createdAt - a.createdAt);
    render();
});



setActive();



/* ACTIVACION MODO ADMIN */
let tapCount = 0;

document.getElementById("title").addEventListener("click", () => {

    tapCount++;
    //console.log("tap", tapCount);

    if (tapCount >= 10) {

        const pwd = prompt("Modo administrador");

        if (pwd === "MiguelVanessa2026") {

            adminMode = !adminMode;

            showToast(
                adminMode
                    ? "🔓 Modo admin activado"
                    : "🔒 Modo admin desactivado"
            );

            render();
        }

        tapCount = 0;
    }

    setTimeout(() => {
        tapCount = 0;
    }, 2000);
});

/* para la pantalla de bienvenida */
document.getElementById("enterAlbum").onclick = () => {

    const screen =
        document.getElementById("welcomeScreen");

    screen.classList.add("welcome-hide");

    setTimeout(() => {
        screen.remove();
    }, 600);
};

/* EFECTO PARA LOS CORAZONES */
function launchHearts(){

    for(let i=0;i<8;i++){

        const heart =
            document.createElement("div");

        heart.className = "heart";

        heart.innerHTML =
            ["❤️","💖","💕","💗"]
            [Math.floor(Math.random()*4)];

        heart.style.setProperty(
            "--x",
            `${Math.random()*200-100}px`
        );

        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 2500);
    }
}

</script>

</body>
</html>
